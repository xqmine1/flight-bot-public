name: Flight Bot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Search mode"
        required: true
        default: "beach"
        type: choice
        options:
          - beach
          - hubs

permissions:
  contents: write

concurrency:
  group: flight-bot
  cancel-in-progress: false

jobs:
  check-flights:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          python -c "import requests; print('requests installed')"

      - name: Run flight checker
        env:
          SEARCH_MODE: ${{ inputs.mode }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
        run: python main.py

      - name: Commit hubs dedup database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain sent_tickets_hubs.json)" ]; then
            git add sent_tickets_hubs.json
            git commit -m "Update hubs dedup database"
            git pull --rebase origin main
            git push
          else
            echo "No hubs dedup changes"
          fi
